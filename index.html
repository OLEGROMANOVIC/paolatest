  .bg:hover { transform: scale(1.0); }

  .overlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.08) 0%,
      rgba(0,0,0,0.0) 40%,
      rgba(0,0,0,0.55) 100%
    );
  }

  .content {
    position: relative;
    z-index: 10;
    width: 100%; height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 10vh;
    animation: fadeUp 1.4s cubic-bezier(.16,1,.3,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .btn {
    display: inline-block;
    padding: 18px 56px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem;
    font-weight: 300;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #fff;
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: background 0.4s ease, border-color 0.4s ease, letter-spacing 0.4s ease;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.12);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s cubic-bezier(.16,1,.3,1);
  }

  .btn:hover::before { transform: scaleX(1); }
  .btn:hover {
    border-color: rgba(255,255,255,1);
    letter-spacing: 0.3em;
  }

  .btn span { position: relative; z-index: 1; }

  /* ── Mobile & responsive ── */
  @media (max-width: 600px) {
    .btn {
      padding: 14px 36px;
      font-size: 1rem;
      letter-spacing: 0.18em;
    }
    .btn:hover { letter-spacing: 0.24em; }
    .content { padding-bottom: 8vh; }
  }

  @media (max-width: 380px) {
    .btn {
      padding: 12px 28px;
      font-size: 0.9rem;
    }
  }

  /* Disable slow zoom on touch — instant feel */
  @media (hover: none) {
    .bg { transform: scale(1) !important; }
    .btn::before { display: none; }
  }
</style>
